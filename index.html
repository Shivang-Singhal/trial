<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Auth & Footprint Logger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="glow"></div>

  <!-- LOGIN CARD -->
  <main class="container" id="loginCard">
    <h1>Welcome Back</h1>
    <p>Sign in to access your account</p>

    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="alex@example.com" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn" id="loginBtn">Sign In / Register</button>
    </form>
    <div id="statusMessage" class="status-msg"></div>
  </main>

  <!-- PROFILE CARD -->
  <main class="container hidden" id="profileCard">
    <div class="avatar-container">
      <div class="avatar" id="avatarLetter">A</div>
    </div>
    
    <h1 id="profileName">User</h1>
    <p class="role-badge">Authenticated User</p>

    <div class="info-box">
      <div class="info-row">
        <span>UID:</span>
        <strong id="profileUid">---</strong>
      </div>
      <div class="info-row">
        <span>IP Address:</span>
        <strong id="profileIp">Detecting...</strong>
      </div>
      <div class="info-row">
        <span>Location:</span>
        <strong id="profileLocation">Detecting...</strong>
      </div>
      <div class="info-row">
        <span>Browser/OS:</span>
        <strong id="profileDevice">Detecting...</strong>
      </div>
    </div>

    <button class="btn btn-secondary" id="logoutBtn">Log Out</button>
  </main>

  <!-- Load script as a Module for Modern Firebase SDK -->
  <script type="module" src="script.js"></script>
</body>
</html>
