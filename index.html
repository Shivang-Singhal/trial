<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Profile System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="glow"></div>

  <!-- LOGIN CARD -->
  <main class="container" id="loginCard">
    <h1>Welcome Back</h1>
    <p>Sign in to access your dashboard</p>

    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. Alex" required>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="alex@example.com" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn">Sign In</button>
    </form>
  </main>

  <!-- PROFILE CARD (Hidden by default) -->
  <main class="container hidden" id="profileCard">
    <div class="avatar-container">
      <div class="avatar" id="avatarLetter">A</div>
    </div>
    
    <h1 id="profileName">Alex</h1>
    <p class="role-badge">Pro Member</p>

    <div class="info-box">
      <div class="info-row">
        <span>Email:</span>
        <strong id="profileEmail">alex@example.com</strong>
      </div>
      <div class="info-row">
        <span>Status:</span>
        <strong class="status-active">Active</strong>
      </div>
    </div>

    <button class="btn btn-secondary" id="logoutBtn">Log Out</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
